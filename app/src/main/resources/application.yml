
spring:
  autoconfigure:
    exclude:
      # Spring AI Alibaba 2.0.0-M1.1 的 dashscope autoconfigure imports 中引用了这个缺失类。
      # 先显式排除，保留 ChatClient/DashScope starter 的学习接入路径。
      - com.alibaba.cloud.ai.autoconfigure.dashscope.DashScopeMultimodalEmbeddingAutoConfiguration
  application:
    name: tripstar
  profiles:
    active: dev
  ai:
    dashscope:
      enabled: ${AI_DASHSCOPE_ENABLED:false}
      api-key: ${AI_DASHSCOPE_API_KEY:}
      chat:
        options:
          model: ${AI_DASHSCOPE_CHAT_MODEL:qwen-plus}
  data:
    redis:
      timeout: 10s
      connect-timeout: 10s

logging:
  file:
    path: ./logs

tripstar:
  map:
    amap:
      enabled: ${AMAP_ENABLED:true}
      key: ${AMAP_KEY:}
      base-url: ${AMAP_BASE_URL:https://restapi.amap.com}
  content:
    xhs:
      enabled: ${XHS_ENABLED:true}
      # service: Java service 先采集小红书；tool: ReactAgent 调用小红书工具；both: 两条链路都跑并合并，适合学习对比。
      mode: ${XHS_MODE:tool}
      cookie: ${XHS_COOKIE:}
      base-url: ${XHS_BASE_URL:https://edith.xiaohongshu.com}
      # 默认使用 content 模块内置的 xhs_sign 资源；如需调试外部签名目录，可用 XHS_SIGN_DIR 覆盖为本地绝对路径。
      sign-dir: ${XHS_SIGN_DIR:classpath:xhs_sign}
      node-command: ${XHS_NODE_COMMAND:node}
      max-notes: ${XHS_MAX_NOTES:4}

############## Sa-Token 配置 (文档: https://sa-token.cc) ##############
sa-token:
  # token 名称（同时也是 cookie 名称）
  token-name: Authorization
  # token 有效期（单位：秒） 默认30天，-1 代表永久有效
  timeout: 2592000
  # token 最低活跃频率（单位：秒），如果 token 超过此时间没有访问系统就会被冻结，默认-1 代表不限制，永不冻结
  active-timeout: -1
  # 是否允许同一账号多地同时登录 （为 true 时允许一起登录, 为 false 时新登录挤掉旧登录）
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个 token （为 true 时所有登录共用一个 token, 为 false 时每次登录新建一个 token）
  is-share: false
  # token 风格（默认可取值：uuid、simple-uuid、random-32、random-64、random-128、tik）
  token-style: uuid
  # 是否输出操作日志
  is-log: true

# MyBatisPlus配置
# https://baomidou.com/config/
mybatis-plus:
  # 对应的 XML 文件位置
  mapper-locations: classpath*:/mapper/**/*Mapper.xml
  # 实体扫描，多个package用逗号或者分号分隔
  type-aliases-package: com.zkry.**.domain
  global-config:
    db-config:
      # 主键类型
      # AUTO 自增 NONE 空 INPUT 用户输入 ASSIGN_ID 雪花 ASSIGN_UUID 唯一 UUID
      # 如需改为自增 需要将数据库表全部设置为自增
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
